name: build-chan_quectel-ipk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git wget curl rsync \
            libncurses-dev zlib1g-dev gettext python3 unzip xz-utils zstd \
            autoconf automake libtool pkg-config perl


      - name: Download OpenWrt SDK 24.10.4 (mediatek filogic)
        run: |
          set -eux
          mkdir -p /tmp/sdk
          cd /tmp/sdk

          wget -O sdk.tar.zst \
          https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          tar --use-compress-program=unzstd -xf sdk.tar.zst

          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"

          echo "SDK_DIR=/tmp/sdk/${SDK_DIR#./}" >> "$GITHUB_ENV"



      - name: Feeds - GitHub mirrors + telephony
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux

          sed -i \
            -e 's|https://git.openwrt.org/openwrt/openwrt.git|https://github.com/openwrt/openwrt.git|g' \
            -e 's|https://git.openwrt.org/feed/packages.git|https://github.com/openwrt/packages.git|g' \
            -e 's|https://git.openwrt.org/project/luci.git|https://github.com/openwrt/luci.git|g' \
            -e 's|https://git.openwrt.org/feed/routing.git|https://github.com/openwrt/routing.git|g' \
            feeds.conf.default

          if ! grep -qE '^\s*src-git\s+telephony\s+' feeds.conf.default; then
            echo "src-git telephony https://github.com/openwrt/telephony.git;openwrt-24.10" >> feeds.conf.default
          fi

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          test -f feeds/telephony/net/asterisk/Makefile



      - name: Link asterisk + compute ASTERISK_VERSION_NUM
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux

          AST_SRC="${PWD}/feeds/telephony/net/asterisk"

          ln -sfn "${AST_SRC}" package/asterisk

          AST_VER="$(sed -nE 's/^PKG_VERSION:=//p' package/asterisk/Makefile | head -n1)"
          AST_VER="${AST_VER%%[^0-9.]*}"
          AST_VER="${AST_VER:-20.8.1}"

          MAJ="${AST_VER%%.*}"
          REST="${AST_VER#*.}"
          MIN="${REST%%.*}"
          PATCH="${REST#*.}"
          PATCH="${PATCH%%[^0-9]*}"

          ASTERISK_VERSION_NUM="$(printf "%d%02d%02d" "${MAJ:-20}" "${MIN:-8}" "${PATCH:-1}" | sed -E 's/^0+//')"
          ASTERISK_VERSION_NUM="${ASTERISK_VERSION_NUM:-0}"

          echo "ASTERISK_VER=$AST_VER" >> "$GITHUB_ENV"
          echo "ASTERISK_VERSION_NUM=$ASTERISK_VERSION_NUM" >> "$GITHUB_ENV"



      - name: Minimal .config
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux

          printf '%s\n' \
            'CONFIG_TARGET_mediatek=y' \
            'CONFIG_TARGET_mediatek_filogic=y' \
            'CONFIG_TARGET_mediatek_filogic_DEVICE_generic=y' \
            'CONFIG_PACKAGE_asterisk=y' \
            'CONFIG_PACKAGE_libopenssl=y' \
            'CONFIG_PACKAGE_libiconv-full=y' \
            'CONFIG_PACKAGE_alsa-lib=y' \
            'CONFIG_PACKAGE_libusb-1.0=y' \
            > .config

          make defconfig



      - name: Build Asterisk first
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          make package/asterisk/compile -j"$(nproc)" V=s



      - name: Stage asterisk.h stub
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux

          TARGET_STAGING="$(ls -d staging_dir/target-* | head -n1)"
          TARGET_INC="${TARGET_STAGING}/usr/include"
          AST_INC="${TARGET_INC}/asterisk"

          echo "TARGET_STAGING=$TARGET_STAGING"
          echo "TARGET_INC=$TARGET_INC"
          echo "AST_INC=$AST_INC"

          mkdir -p "$AST_INC"

          if [ ! -f "$TARGET_INC/asterisk.h" ]; then

            printf '%s\n' \
            '#ifndef ASTERISK_H' \
            '#define ASTERISK_H 1' \
            '' \
            '/* OpenWrt stub header for chan_quectel */' \
            '' \
            '#include <asterisk/autoconfig.h>' \
            '#include <asterisk/compiler.h>' \
            '' \
            '#endif' \
            > "$TARGET_INC/asterisk.h"

          fi

          test -f "$TARGET_INC/asterisk.h"
          head -n 20 "$TARGET_INC/asterisk.h"



      - name: Add chan_quectel source
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux

          rm -rf package/feeds/custom/chan_quectel

          mkdir -p package/feeds/custom/chan_quectel/src

          git clone --depth 1 \
          https://github.com/IchthysMaranatha/asterisk-chan-quectel.git \
          /tmp/chan

          rsync -a --delete /tmp/chan/ package/feeds/custom/chan_quectel/src/



      - name: Write chan_quectel Makefile
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux

          MF="package/feeds/custom/chan_quectel/Makefile"

          printf '%s\n' \
          'include $(TOPDIR)/rules.mk' \
          '' \
          'PKG_NAME:=chan_quectel' \
          'PKG_VERSION:=git' \
          'PKG_RELEASE:=v54f' \
          '' \
          'PKG_BUILD_DIR:=$(BUILD_DIR)/chan_quectel' \
          'PKG_BUILD_DEPENDS:=asterisk' \
          '' \
          'include $(INCLUDE_DIR)/package.mk' \
          '' \
          'define Package/chan_quectel' \
          '  SECTION:=net' \
          '  CATEGORY:=Network' \
          '  SUBMENU:=Telephony' \
          '  TITLE:=Asterisk channel driver for Quectel LTE modems' \
          '  DEPENDS:=+asterisk +libopenssl +libiconv-full +alsa-lib +libusb-1.0' \
          'endef' \
          '' \
          'define Build/Prepare' \
          '  $(INSTALL_DIR) $(PKG_BUILD_DIR)' \
          '  $(CP) ./src/* $(PKG_BUILD_DIR)/' \
          'endef' \
          '' \
          'define Build/Configure' \
          '  (cd $(PKG_BUILD_DIR); autoreconf -fi)' \
          '  cd $(PKG_BUILD_DIR) && ./configure --host=$(GNU_TARGET_NAME) --prefix=/usr' \
          'endef' \
          '' \
          'define Build/Compile' \
          '  $(MAKE) -C $(PKG_BUILD_DIR)' \
          'endef' \
          '' \
          'define Package/chan_quectel/install' \
          '  $(INSTALL_DIR) $(1)/usr/lib/asterisk/modules' \
          '  $(INSTALL_BIN) $(PKG_BUILD_DIR)/chan_quectel.so $(1)/usr/lib/asterisk/modules/' \
          'endef' \
          '' \
          '$(eval $(call BuildPackage,chan_quectel))' \
          > "$MF"

          sed -i 's/^  /\t/' "$MF"



      - name: Enable chan_quectel
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          echo 'CONFIG_PACKAGE_chan_quectel=y' >> .config
          make defconfig
          make package/feeds/custom/chan_quectel/compile V=s -j"$(nproc)"



      - name: Collect artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux

          mkdir -p /tmp/artifacts

          find . -name "chan_quectel*.ipk" -exec cp -v {} /tmp/artifacts/ \; || true
          find build_dir -name "chan_quectel.so" -exec cp -v {} /tmp/artifacts/ \; || true

          ls -la /tmp/artifacts



      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chan_quectel-ipk
          path: /tmp/artifacts/*