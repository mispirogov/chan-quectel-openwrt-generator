name: build-chan_quectel-ipk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            curl \
            rsync \
            libncurses-dev \
            zlib1g-dev \
            gettext \
            python3 \
            unzip \
            xz-utils \
            zstd

      - name: Download OpenWrt SDK 24.10.4 (mediatek filogic)
        run: |
          set -eux
          mkdir -p /tmp/sdk
          cd /tmp/sdk
          wget -O sdk.tar.zst https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          echo "SDK_DIR=/tmp/sdk/${SDK_DIR#./}" >> "$GITHUB_ENV"

      - name: Add telephony feed + update/install feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          if ! grep -qE '^\s*src-git\s+telephony\s+' feeds.conf.default; then
            echo "src-git telephony https://github.com/openwrt/telephony.git;openwrt-24.10" >> feeds.conf.default
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          test -f feeds/telephony/net/asterisk/Makefile

      - name: Link asterisk as package/asterisk + compute ASTERISK_VERSION_NUM (no heredoc)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux

          AST_SRC="${PWD}/feeds/telephony/net/asterisk"
          test -f "${AST_SRC}/Makefile"

          ln -sfn "${AST_SRC}" package/asterisk
          test -f package/asterisk/Makefile

          AST_VER="$(sed -nE 's/^PKG_VERSION:=//p' package/asterisk/Makefile | head -n1 || true)"
          AST_VER="${AST_VER%%[^0-9.]*}"
          if [ -z "$AST_VER" ]; then
            AST_VER="20.8.1"
          fi

          OLDIFS="$IFS"
          IFS='.'
          set -- $AST_VER
          IFS="$OLDIFS"

          MA="${1:-0}"
          MI="${2:-0}"
          PA="${3:-0}"

          ASTERISK_VERSION_NUM="$(printf '%d%02d%02d' "$MA" "$MI" "$PA" | sed -E 's/^0+//')"
          if [ -z "$ASTERISK_VERSION_NUM" ]; then
            ASTERISK_VERSION_NUM="0"
          fi

          echo "ASTERISK_VER=$AST_VER" >> "$GITHUB_ENV"
          echo "ASTERISK_VERSION_NUM=$ASTERISK_VERSION_NUM" >> "$GITHUB_ENV"
          echo "ASTERISK_VERSION_NUM=$ASTERISK_VERSION_NUM"

      - name: Minimal .config (build asterisk first)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          CFG=".config"
          : > "$CFG"
          printf '%s\n' \
            'CONFIG_TARGET_mediatek=y' \
            'CONFIG_TARGET_mediatek_filogic=y' \
            'CONFIG_TARGET_mediatek_filogic_DEVICE_generic=y' \
            '' \
            'CONFIG_PACKAGE_asterisk=y' \
            'CONFIG_PACKAGE_libopenssl=y' \
            'CONFIG_PACKAGE_libiconv-full=y' \
            'CONFIG_PACKAGE_alsa-lib=y' \
            'CONFIG_PACKAGE_libusb-1.0=y' \
            >> "$CFG"
          make defconfig

      - name: Build Asterisk first (populate staging headers)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          make package/asterisk/compile -j"$(nproc)" V=s

      - name: Add chan_quectel source
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          rm -rf package/feeds/custom/chan_quectel
          mkdir -p package/feeds/custom/chan_quectel/src
          git clone --depth 1 https://github.com/IchthysMaranatha/asterisk-chan-quectel.git /tmp/chan
          rsync -a --delete /tmp/chan/ package/feeds/custom/chan_quectel/src/

      - name: Patch chan_quectel pthread prototypes (musl workaround)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          SRC_DIR="package/feeds/custom/chan_quectel/src"
          find "$SRC_DIR" -type f \( -name '*.c' -o -name '*.h' \) -print0 | while IFS= read -r -d '' f; do
            sed -i -E \
              '/^[[:space:]]*(extern[[:space:]]+)?void[[:space:]]*\*[[:space:]]*pthread_getspecific[[:space:]]*\(/d; /^[[:space:]]*(extern[[:space:]]+)?int[[:space:]]+pthread_setspecific[[:space:]]*\(/d' \
              "$f"
          done

      - name: Write chan_quectel OpenWrt package Makefile (v23 — clean preinclude)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          MF="package/feeds/custom/chan_quectel/Makefile"
          PRE="package/feeds/custom/chan_quectel/preinclude.h"
          mkdir -p package/feeds/custom/chan_quectel
          printf '#ifndef CHAN_QUECTEL_PREINCLUDE_H\n#define CHAN_QUECTEL_PREINCLUDE_H\n\n#define _GNU_SOURCE\n#define _DEFAULT_SOURCE\n#define _BSD_SOURCE\n#define _XOPEN_SOURCE 700\n#define _POSIX_C_SOURCE 200809L\n#define _POSIX_SOURCE\n#define _POSIX_TIMERS 1\n#define _POSIX_MONOTONIC_CLOCK 1\n#define __MUSL__\n#define __USE_MISC 1\n#define __USE_GNU\n\n#undef _FORTIFY_SOURCE\n#define _FORTIFY_SOURCE 0\n\n#define HAVE_ARPA_INET_H 1\n#define HAVE_NETINET_IN_H 1\n#define HAVE_SYS_SOCKET_H 1\n#define HAVE_STDINT_H 1\n#define HAVE_INTTYPES_H 1\n#define HAVE_TIME_H 1\n#define HAVE_SYS_TYPES_H 1\n#define HAVE_PTHREAD_H 1\n#define HAVE_ENDIAN_H 1\n\n/* Fallback for Asterisk */\n#ifndef force_inline\n#define force_inline static inline __attribute__((always_inline))\n#endif\n\n#endif\n' > "$PRE"
          printf '%s\n' \
            'include $(TOPDIR)/rules.mk' \
            '' \
            'PKG_NAME:=chan_quectel' \
            'PKG_VERSION:=git' \
            'PKG_RELEASE:=1' \
            '' \
            'PKG_BUILD_DIR:=$(BUILD_DIR)/$(PKG_NAME)' \
            'PKG_BUILD_DEPENDS:=asterisk' \
            '' \
            'STAGING_DIR_TARGET ?= $(STAGING_DIR)' \
            '' \
            'include $(INCLUDE_DIR)/package.mk' \
            '' \
            'define Package/chan_quectel' \
            '	SECTION:=net' \
            '	CATEGORY:=Network' \
            '	SUBMENU:=Telephony' \
            '	TITLE:=Asterisk channel driver for Quectel LTE modems' \
            '	DEPENDS:=+asterisk +libopenssl +libiconv-full +alsa-lib +libusb-1.0' \
            'endef' \
            '' \
            'define Package/chan_quectel/description' \
            '	Asterisk channel driver (chan_quectel) for Quectel LTE modems.' \
            'endef' \
            '' \
            'define Build/Prepare' \
            '	$(INSTALL_DIR) $(PKG_BUILD_DIR)' \
            '	$(CP) ./src/* $(PKG_BUILD_DIR)/' \
            '	$(CP) ./preinclude.h $(PKG_BUILD_DIR)/preinclude.h' \
            'endef' \
            '' \
            'define Build/Compile' \
            '	@echo "Compiling chan_quectel.c - v23 clean preinclude"' \
            '	$(TARGET_CC) -shared -fPIC \' \
            '		-include $(PKG_BUILD_DIR)/preinclude.h \' \
            '		-include $(STAGING_DIR_TARGET)/usr/include/asterisk/compiler.h \' \
            '		-include $(STAGING_DIR_TARGET)/usr/include/asterisk/autoconfig.h \' \
            '		-I$(STAGING_DIR_TARGET)/usr/include -I$(STAGING_DIR_TARGET)/usr/include/asterisk -I$(STAGING_DIR_TARGET)/usr/include/libusb-1.0 \' \
            '		-DASTERISK_VERSION_NUM='"${ASTERISK_VERSION_NUM}"' -DAST_MODULE_SELF_SYM=__internal_asterisk_module_self -DAST_MODULE=\"chan_quectel\" \' \
            '		-Os -pipe -mcpu=cortex-a53 -fno-caller-saves -fno-plt -fhonour-copts -ffile-prefix-map=chan_quectel=chan_quectel -Wformat -Werror=format-security -fstack-protector -Wl,-z,now -Wl,-z,relro \' \
            '		-o $(PKG_BUILD_DIR)/chan_quectel.so \' \
            '		$(PKG_BUILD_DIR)/chan_quectel.c \' \
            '		-L$(STAGING_DIR_TARGET)/usr/lib -lusb-1.0 -lasound -lssl -lcrypto' \
            'endef' \
            '' \
            'define Package/chan_quectel/install' \
            '	$(INSTALL_DIR) $(1)/usr/lib/asterisk/modules' \
            '	$(INSTALL_BIN) $(PKG_BUILD_DIR)/chan_quectel.so $(1)/usr/lib/asterisk/modules/' \
            'endef' \
            '' \
            '$(eval $(call BuildPackage,chan_quectel))' \
            > "$MF"
          perl -pi -e 's/^ {4}/\t/' "$MF"
          sed -i 's/\r$//' "$MF"
          echo "=== Generated Makefile ==="
          nl -ba "$MF" | sed -n '1,110p'
          echo "=== preinclude.h ==="
          cat "$PRE"

      - name: Enable chan_quectel in .config and defconfig
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          printf '%s\n' 'CONFIG_PACKAGE_chan_quectel=y' >> .config
          make defconfig

      - name: Build chan_quectel
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          make package/feeds/custom/chan_quectel/compile -j"$(nproc)" V=s

      - name: Collect artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          mkdir -p /tmp/artifacts
          find bin/packages -type f -name "chan_quectel_*.ipk" -exec cp -v {} /tmp/artifacts/ \; || true
          find build_dir -type f -name "chan_quectel.so" -exec cp -v {} /tmp/artifacts/ \; || true
          ls -la /tmp/artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chan_quectel-ipk
          path: /tmp/artifacts/*