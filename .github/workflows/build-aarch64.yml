name: build-chan_quectel-ipk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git wget curl rsync \
            libncurses-dev zlib1g-dev gettext python3 unzip xz-utils zstd \
            autoconf automake libtool pkg-config perl

      - name: Download OpenWrt SDK 24.10.4 mediatek filogic
        run: |
          set -eux
          mkdir -p /tmp/sdk
          cd /tmp/sdk
          wget -O sdk.tar.zst https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          echo "SDK_DIR=/tmp/sdk/${SDK_DIR#./}" >> "$GITHUB_ENV"

      - name: Add telephony feed and install feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          if ! grep -qE '^\s*src-git\s+telephony\s+' feeds.conf.default; then
            echo "src-git telephony https://github.com/openwrt/telephony.git;openwrt-24.10" >> feeds.conf.default
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          test -f feeds/telephony/net/asterisk/Makefile

      - name: Link asterisk and compute ASTERISK_VERSION_NUM
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          AST_SRC="${PWD}/feeds/telephony/net/asterisk"
          ln -sfn "${AST_SRC}" package/asterisk
          test -f package/asterisk/Makefile

          AST_VER="$(sed -nE 's/^PKG_VERSION:=//p' package/asterisk/Makefile | head -n1 || true)"
          AST_VER="${AST_VER%%[^0-9.]*}"
          if [ -z "$AST_VER" ]; then AST_VER="20.8.1"; fi

          OLDIFS="$IFS"
          IFS='.'
          set -- $AST_VER
          IFS="$OLDIFS"
          MA="${1:-0}"
          MI="${2:-0}"
          PA="${3:-0}"

          ASTERISK_VERSION_NUM="$(printf '%d%02d%02d' "$MA" "$MI" "$PA" | sed -E 's/^0+//')"
          if [ -z "$ASTERISK_VERSION_NUM" ]; then ASTERISK_VERSION_NUM="0"; fi

          echo "ASTERISK_VER=$AST_VER" >> "$GITHUB_ENV"
          echo "ASTERISK_VERSION_NUM=$ASTERISK_VERSION_NUM" >> "$GITHUB_ENV"
          echo "ASTERISK_VERSION_NUM=$ASTERISK_VERSION_NUM"

      - name: Minimal config build asterisk first
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          printf '%s\n' \
            'CONFIG_TARGET_mediatek=y' \
            'CONFIG_TARGET_mediatek_filogic=y' \
            'CONFIG_TARGET_mediatek_filogic_DEVICE_generic=y' \
            '' \
            'CONFIG_PACKAGE_asterisk=y' \
            'CONFIG_PACKAGE_libopenssl=y' \
            'CONFIG_PACKAGE_libiconv-full=y' \
            'CONFIG_PACKAGE_alsa-lib=y' \
            'CONFIG_PACKAGE_libusb-1.0=y' > .config
          make defconfig

      - name: Build asterisk populate staging
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          make package/asterisk/compile -j"$(nproc)" V=s

      - name: Add chan_quectel source and preinclude.h v46g
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          rm -rf package/feeds/custom/chan_quectel
          mkdir -p package/feeds/custom/chan_quectel/src
          git clone --depth 1 https://github.com/IchthysMaranatha/asterisk-chan-quectel.git /tmp/chan
          rsync -a --delete /tmp/chan/ package/feeds/custom/chan_quectel/src/

          PRE="package/feeds/custom/chan_quectel/src/preinclude.h"
          printf '%s\n' \
            '#ifndef QUECTEL_PREINCLUDE_H' \
            '#define QUECTEL_PREINCLUDE_H' \
            '' \
            '#define _GNU_SOURCE 1' \
            '#define _DEFAULT_SOURCE 1' \
            '#define _POSIX_C_SOURCE 200809L' \
            '#define _XOPEN_SOURCE 700' \
            '#define _FILE_OFFSET_BITS 64' \
            '' \
            '#undef _FORTIFY_SOURCE' \
            '#define _FORTIFY_SOURCE 0' \
            '' \
            '#include <features.h>' \
            '' \
            '#endif' > "$PRE"

          echo "=== preinclude.h v46g ==="
          cat "$PRE"

      - name: Write chan_quectel Makefile v46g
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          MF="package/feeds/custom/chan_quectel/Makefile"

          printf '%s\n' \
            'include $(TOPDIR)/rules.mk' \
            '' \
            'PKG_NAME:=chan_quectel' \
            'PKG_VERSION:=git' \
            'PKG_RELEASE:=v46g' \
            '' \
            'PKG_BUILD_DIR:=$(BUILD_DIR)/chan_quectel' \
            'PKG_BUILD_DEPENDS:=asterisk' \
            '' \
            'include $(INCLUDE_DIR)/package.mk' \
            '' \
            '# Do not rely on $(STAGING_DIR_TARGET) for discovery; use SDK staging_dir paths' \
            'AST_INC:=$(firstword $(wildcard $(TOPDIR)/staging_dir/target-*/usr/include/asterisk))' \
            'TARGET_INC:=$(patsubst %/asterisk,%,$(AST_INC))' \
            'TOOLCHAIN_INC:=$(firstword $(wildcard $(TOPDIR)/staging_dir/toolchain-*/include))' \
            '' \
            'TARGET_CFLAGS_NOFORTIFY:=$(filter-out -D_FORTIFY_SOURCE%,$(TARGET_CFLAGS))' \
            'TARGET_CPPFLAGS_NOFORTIFY:=$(filter-out -D_FORTIFY_SOURCE%,$(TARGET_CPPFLAGS))' \
            '' \
            'define Package/chan_quectel' \
            '  SECTION:=net' \
            '  CATEGORY:=Network' \
            '  SUBMENU:=Telephony' \
            '  TITLE:=Asterisk channel driver for Quectel LTE modems' \
            '  DEPENDS:=+asterisk +libopenssl +libiconv-full +alsa-lib +libusb-1.0' \
            'endef' \
            '' \
            'define Package/chan_quectel/description' \
            '  Asterisk channel driver (chan_quectel) for Quectel LTE modems.' \
            'endef' \
            '' \
            'define Build/Prepare' \
            '    $(INSTALL_DIR) $(PKG_BUILD_DIR)' \
            '    $(CP) ./src/* $(PKG_BUILD_DIR)/' \
            '    @echo "[v46g] AST_INC=$(AST_INC)"' \
            '    @echo "[v46g] TARGET_INC=$(TARGET_INC)"' \
            '    @echo "[v46g] TOOLCHAIN_INC=$(TOOLCHAIN_INC)"' \
            '    @test -n "$(AST_INC)" || { echo "[v46g] ERROR: AST_INC empty"; exit 1; }' \
            '    @test -n "$(TOOLCHAIN_INC)" || { echo "[v46g] ERROR: TOOLCHAIN_INC empty"; exit 1; }' \
            '    @test -f "$(TOOLCHAIN_INC)/stdint.h" || { echo "[v46g] ERROR: toolchain stdint.h missing"; exit 1; }' \
            '    @test -f "$(AST_INC)/compat.h" || { echo "[v46g] ERROR: compat.h missing"; exit 1; }' \
            '    @test -f "$(AST_INC)/astmm.h" || { echo "[v46g] ERROR: astmm.h missing"; exit 1; }' \
            '    @grep -q "<pthread.h>" "$(AST_INC)/compat.h" && echo "[v46g] compat.h already patched" || (sed -i "/^#include <unistd.h>/a#include <pthread.h>" "$(AST_INC)/compat.h" && echo "[v46g] compat.h patched")' \
            '    @grep -q "OPENWRT_MUSL_ASTMM" "$(AST_INC)/astmm.h" && echo "[v46g] astmm.h already patched" || (sed -i -E "s@^#define[[:space:]][[:space:]]*ASTMM_LIBC[[:space:]][[:space:]]*ASTMM_BLOCK.*@#define ASTMM_LIBC ASTMM_IGNORE /* OPENWRT_MUSL_ASTMM */@" "$(AST_INC)/astmm.h" && echo "[v46g] astmm.h patched")' \
            'endef' \
            '' \
            'define Build/Configure' \
            '    @echo "[v46g] autotools prepare"' \
            '    cd $(PKG_BUILD_DIR) && [ -x ./bootstrap ] && ./bootstrap || true' \
            '    cd $(PKG_BUILD_DIR) && [ -x ./configure ] || autoreconf -fi' \
            '    cd $(PKG_BUILD_DIR) && [ -f ./configure ] && [ ! -x ./configure ] && chmod +x ./configure || true' \
            '    @echo "[v46g] running configure"' \
            '    cd $(PKG_BUILD_DIR) && CC="$(TARGET_CC)" AR="$(TARGET_AR)" LD="$(TARGET_CC)" STRIP="$(TARGET_STRIP)" \' \
            '      CPPFLAGS="$(TARGET_CPPFLAGS_NOFORTIFY) -isystem $(TOOLCHAIN_INC) -I$(TARGET_INC) -I$(AST_INC) -I$(TARGET_INC)/libusb-1.0 -include $(PKG_BUILD_DIR)/preinclude.h -include $(AST_INC)/compiler.h -include $(AST_INC)/autoconfig.h -DASTERISK_VERSION_NUM=$(ASTERISK_VERSION_NUM) -DAST_MODULE_SELF_SYM=__internal_asterisk_module_self -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0" \' \
            '      CFLAGS="$(TARGET_CFLAGS_NOFORTIFY) -fPIC -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -Wno-error" \' \
            '      LDFLAGS="$(TARGET_LDFLAGS) -L$(STAGING_DIR_TARGET)/usr/lib" \' \
            '      LIBS="-lusb-1.0 -lasound -lssl -lcrypto -lpthread" \' \
            '      ./configure --host=$(GNU_TARGET_NAME) --build=$(GNU_HOST_NAME) --prefix=/usr || { echo "[v46g] configure failed"; test -f config.log && { echo "=== config.log ==="; cat config.log; }; exit 1; }' \
            '    @test -f "$(PKG_BUILD_DIR)/Makefile" || { echo "[v46g] ERROR: Makefile not generated"; exit 1; }' \
            'endef' \
            '' \
            'define Build/Compile' \
            '    @echo "[v46g] build"' \
            '    $(MAKE) -C $(PKG_BUILD_DIR) CC="$(TARGET_CC)" AR="$(TARGET_AR)" LD="$(TARGET_CC)" STRIP="$(TARGET_STRIP)"' \
            '    @if [ -f "$(PKG_BUILD_DIR)/.libs/chan_quectel.so" ] && [ ! -f "$(PKG_BUILD_DIR)/chan_quectel.so" ]; then cp "$(PKG_BUILD_DIR)/.libs/chan_quectel.so" "$(PKG_BUILD_DIR)/chan_quectel.so"; fi' \
            '    @test -f "$(PKG_BUILD_DIR)/chan_quectel.so" || { echo "[v46g] ERROR: chan_quectel.so NOT built"; exit 1; }' \
            'endef' \
            '' \
            'define Package/chan_quectel/install' \
            '    $(INSTALL_DIR) $(1)/usr/lib/asterisk/modules' \
            '    $(INSTALL_BIN) $(PKG_BUILD_DIR)/chan_quectel.so $(1)/usr/lib/asterisk/modules/' \
            'endef' \
            '' \
            '$(eval $(call BuildPackage,chan_quectel))' \
            > "$MF"

          # Convert leading 4 spaces to TAB for recipe lines
          perl -pi -e 's/^ {4}/\t/' "$MF"
          sed -i 's/\r$//' "$MF"

          echo "=== Makefile v46g ==="
          nl -ba "$MF" | sed -n '1,260p'

      - name: Enable chan_quectel and build
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          echo 'CONFIG_PACKAGE_chan_quectel=y' >> .config
          make defconfig
          make package/feeds/custom/chan_quectel/compile V=s -j"$(nproc)"

      - name: Collect artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          mkdir -p /tmp/artifacts
          find bin/packages -type f -name "chan_quectel_*.ipk" -exec cp -v {} /tmp/artifacts/ \; || true
          find build_dir -type f -name "chan_quectel.so" -exec cp -v {} /tmp/artifacts/ \; || true
          ls -la /tmp/artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chan_quectel-ipk
          path: /tmp/artifacts/*