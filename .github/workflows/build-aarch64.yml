name: build-chan_quectel-ipk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git wget curl rsync \
            libncurses-dev zlib1g-dev gettext python3 unzip xz-utils zstd \
            autoconf automake libtool pkg-config perl

      - name: Download OpenWrt SDK 24.10.4 (mediatek filogic)
        run: |
          set -eux
          mkdir -p /tmp/sdk
          cd /tmp/sdk
          wget -O sdk.tar.zst https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          echo "SDK_DIR=/tmp/sdk/${SDK_DIR#./}" >> "$GITHUB_ENV"

      - name: Feeds - GitHub mirrors + telephony + retry update
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          sed -i \
            -e 's|https://git.openwrt.org/openwrt/openwrt.git|https://github.com/openwrt/openwrt.git|g' \
            -e 's|https://git.openwrt.org/feed/packages.git|https://github.com/openwrt/packages.git|g' \
            -e 's|https://git.openwrt.org/project/luci.git|https://github.com/openwrt/luci.git|g' \
            -e 's|https://git.openwrt.org/feed/routing.git|https://github.com/openwrt/routing.git|g' \
            feeds.conf.default

          if ! grep -qE '^\s*src-git\s+telephony\s+' feeds.conf.default; then
            echo "src-git telephony https://github.com/openwrt/telephony.git;openwrt-24.10" >> feeds.conf.default
          fi

          for i in 1 2 3; do
            if ./scripts/feeds update -a; then
              break
            fi
            echo "feeds update failed (attempt $i)" >&2
            sleep $((i * 5))
          done

          ./scripts/feeds install -a
          test -f feeds/telephony/net/asterisk/Makefile

      - name: Link asterisk + compute ASTERISK_VERSION_NUM
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          AST_SRC="${PWD}/feeds/telephony/net/asterisk"
          ln -sfn "${AST_SRC}" package/asterisk

          AST_VER="$(sed -nE 's/^PKG_VERSION:=//p' package/asterisk/Makefile | head -n1)"
          AST_VER="${AST_VER%%[^0-9.]*}"
          AST_VER="${AST_VER:-20.8.1}"

          MAJ="${AST_VER%%.*}"
          REST="${AST_VER#*.}"
          MIN="${REST%%.*}"
          PATCH="${REST#*.}"
          PATCH="${PATCH%%[^0-9]*}"

          ASTERISK_VERSION_NUM="$(printf "%d%02d%02d" "${MAJ:-20}" "${MIN:-8}" "${PATCH:-1}" | sed -E 's/^0+//')"
          ASTERISK_VERSION_NUM="${ASTERISK_VERSION_NUM:-0}"

          echo "ASTERISK_VER=$AST_VER" >> "$GITHUB_ENV"
          echo "ASTERISK_VERSION_NUM=$ASTERISK_VERSION_NUM" >> "$GITHUB_ENV"

          echo "ASTERISK_VER=$AST_VER"
          echo "ASTERISK_VERSION_NUM=$ASTERISK_VERSION_NUM"

      - name: Minimal .config (build asterisk first)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          printf '%s\n' \
            'CONFIG_TARGET_mediatek=y' \
            'CONFIG_TARGET_mediatek_filogic=y' \
            'CONFIG_TARGET_mediatek_filogic_DEVICE_generic=y' \
            'CONFIG_PACKAGE_asterisk=y' \
            'CONFIG_PACKAGE_libopenssl=y' \
            'CONFIG_PACKAGE_libiconv-full=y' \
            'CONFIG_PACKAGE_libsqlite3=y' \
            'CONFIG_PACKAGE_alsa-lib=y' \
            'CONFIG_PACKAGE_libusb-1.0=y' > .config
          make defconfig

      - name: Build Asterisk first (clean + serialize)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          make package/asterisk/clean V=s || true
          make package/asterisk/compile V=s -j1

      - name: Normalize staged Asterisk headers + locate iconv (v55l)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux

          TARGET_STAGING="$(ls -d staging_dir/target-* | head -n1)"
          TARGET_INC="${TARGET_STAGING}/usr/include"
          TOOLCHAIN_STAGING="$(ls -d staging_dir/toolchain-* | head -n1)"
          TOOLCHAIN_INC="${TOOLCHAIN_STAGING}/include"
          TOOLCHAIN_USR_INC="${TOOLCHAIN_STAGING}/usr/include"

          AST_VERSIONED_HEADERS="$(find "$TARGET_INC" -maxdepth 2 -type d -path "$TARGET_INC/asterisk-*/include" | head -n1 || true)"
          AST_HEADERS=""
          AST_INC=""
          ICONV_HEADER_FILE=""
          ICONV_HEADERS=""

          echo "[v55l] TARGET_STAGING=$TARGET_STAGING"
          echo "[v55l] TARGET_INC=$TARGET_INC"
          echo "[v55l] TOOLCHAIN_STAGING=$TOOLCHAIN_STAGING"
          echo "[v55l] TOOLCHAIN_INC=$TOOLCHAIN_INC"
          echo "[v55l] TOOLCHAIN_USR_INC=$TOOLCHAIN_USR_INC"
          echo "[v55l] AST_VERSIONED_HEADERS=$AST_VERSIONED_HEADERS"

          if [ -n "$AST_VERSIONED_HEADERS" ]; then
            AST_HEADERS="$AST_VERSIONED_HEADERS"
            AST_INC="$AST_HEADERS/asterisk"
          elif [ -d "$TARGET_INC/asterisk" ]; then
            AST_HEADERS="$TARGET_INC"
            AST_INC="$TARGET_INC/asterisk"
          else
            echo "[v55l] ERROR: no staged Asterisk headers root found"
            find "$TARGET_INC" -maxdepth 3 -name 'asterisk*' -print | sort || true
            exit 1
          fi

          for f in \
            "$TARGET_INC/iconv.h" \
            "$TOOLCHAIN_INC/iconv.h" \
            "$TOOLCHAIN_USR_INC/iconv.h"
          do
            if [ -f "$f" ]; then
              ICONV_HEADER_FILE="$f"
              break
            fi
          done

          if [ -z "$ICONV_HEADER_FILE" ]; then
            echo "[v55l] ERROR: iconv.h not found in target/toolchain staging"
            find "$TARGET_STAGING" "$TOOLCHAIN_STAGING" -type f -name 'iconv.h' -print | sort || true
            exit 1
          fi

          ICONV_HEADERS="${ICONV_HEADER_FILE%/iconv.h}"

          echo "[v55l] AST_HEADERS=$AST_HEADERS"
          echo "[v55l] AST_INC=$AST_INC"
          echo "[v55l] ICONV_HEADER_FILE=$ICONV_HEADER_FILE"
          echo "[v55l] ICONV_HEADERS=$ICONV_HEADERS"

          if [ ! -f "$AST_HEADERS/asterisk.h" ]; then
            echo "[v55l] asterisk.h missing in staged include root, searching build_dir"
            SRC_ASTERISK_H="$(find build_dir -type f -path '*/asterisk-*/include/asterisk.h' | head -n1 || true)"
            echo "[v55l] SRC_ASTERISK_H=$SRC_ASTERISK_H"
            test -n "$SRC_ASTERISK_H" || { echo "[v55l] ERROR: cannot locate build_dir copy of asterisk.h"; exit 1; }
            cp -f "$SRC_ASTERISK_H" "$AST_HEADERS/asterisk.h"
          fi

          test -f "$AST_HEADERS/asterisk.h"
          test -f "$AST_INC/compat.h"
          test -f "$AST_INC/astmm.h"
          test -f "$ICONV_HEADER_FILE"

          echo "=== v55l staged Asterisk/iconv probe ==="
          find "$TARGET_INC" -maxdepth 3 \( -name 'asterisk.h' -o -name 'compat.h' -o -name 'astmm.h' -o -name 'iconv.h' \) -print | sort || true
          find "$TOOLCHAIN_INC" -maxdepth 1 -name 'iconv.h' -print | sort || true
          find "$TOOLCHAIN_USR_INC" -maxdepth 1 -name 'iconv.h' -print | sort || true

      - name: Add chan_quectel source (v55l)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          rm -rf package/feeds/custom/chan_quectel
          mkdir -p package/feeds/custom/chan_quectel/src
          git clone --depth 1 https://github.com/IchthysMaranatha/asterisk-chan-quectel.git /tmp/chan
          rsync -a --delete /tmp/chan/ package/feeds/custom/chan_quectel/src/

      - name: Write chan_quectel Makefile (v55l)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          MF="package/feeds/custom/chan_quectel/Makefile"

          printf '%s\n' \
            'include $(TOPDIR)/rules.mk' \
            '' \
            'PKG_NAME:=chan_quectel' \
            'PKG_VERSION:=git' \
            'PKG_RELEASE:=v55l' \
            'PKG_BUILD_DIR:=$(BUILD_DIR)/chan_quectel' \
            'PKG_BUILD_DEPENDS:=asterisk libiconv-full libsqlite3 libusb-1.0 alsa-lib' \
            'MODULES_DIR:=/usr/lib/asterisk/modules' \
            '' \
            'include $(INCLUDE_DIR)/package.mk' \
            'include $(INCLUDE_DIR)/nls.mk' \
            '' \
            'STAGING_INC:=$(STAGING_DIR)/usr/include' \
            'TOOLCHAIN_DIR:=$(firstword $(wildcard $(TOPDIR)/staging_dir/toolchain-*))' \
            'TOOLCHAIN_INC:=$(if $(TOOLCHAIN_DIR),$(TOOLCHAIN_DIR)/include)' \
            'TOOLCHAIN_USR_INC:=$(if $(TOOLCHAIN_DIR),$(TOOLCHAIN_DIR)/usr/include)' \
            'AST_VERSIONED_HEADERS:=$(firstword $(wildcard $(STAGING_INC)/asterisk-*/include))' \
            'AST_FLAT_HEADERS:=$(if $(wildcard $(STAGING_INC)/asterisk.h),$(STAGING_INC))' \
            'AST_HEADERS:=$(if $(AST_VERSIONED_HEADERS),$(AST_VERSIONED_HEADERS),$(AST_FLAT_HEADERS))' \
            'AST_INC:=$(if $(AST_HEADERS),$(AST_HEADERS)/asterisk)' \
            'TARGET_ICONV_HEADERS:=$(if $(wildcard $(STAGING_INC)/iconv.h),$(STAGING_INC))' \
            'TOOLCHAIN_ICONV_HEADERS:=$(if $(wildcard $(TOOLCHAIN_INC)/iconv.h),$(TOOLCHAIN_INC))' \
            'TOOLCHAIN_USR_ICONV_HEADERS:=$(if $(wildcard $(TOOLCHAIN_USR_INC)/iconv.h),$(TOOLCHAIN_USR_INC))' \
            'ICONV_HEADERS:=$(if $(TARGET_ICONV_HEADERS),$(TARGET_ICONV_HEADERS),$(if $(TOOLCHAIN_ICONV_HEADERS),$(TOOLCHAIN_ICONV_HEADERS),$(TOOLCHAIN_USR_ICONV_HEADERS)))' \
            '' \
            'TARGET_CFLAGS_NOFORTIFY:=$(filter-out -D_FORTIFY_SOURCE%,$(TARGET_CFLAGS))' \
            'TARGET_CPPFLAGS_NOFORTIFY:=$(filter-out -D_FORTIFY_SOURCE%,$(TARGET_CPPFLAGS))' \
            'HOST_INCLUDE_POISON:=-I/usr/include -I/usr/local/include -isystem/usr/include -isystem/usr/local/include' \
            'TARGET_CFLAGS_CLEAN:=$(filter-out $(HOST_INCLUDE_POISON),$(TARGET_CFLAGS_NOFORTIFY))' \
            'TARGET_CPPFLAGS_CLEAN:=$(filter-out $(HOST_INCLUDE_POISON),$(TARGET_CPPFLAGS_NOFORTIFY))' \
            '' \
            'define Package/chan_quectel' \
            '    SECTION:=net' \
            '    CATEGORY:=Network' \
            '    SUBMENU:=Telephony' \
            '    TITLE:=Asterisk channel driver for Quectel LTE modems' \
            '    DEPENDS:=$(ICONV_DEPENDS) +asterisk +libsqlite3 +libopenssl +alsa-lib +libusb-1.0' \
            'endef' \
            '' \
            'define Build/Prepare' \
            '    $(INSTALL_DIR) $(PKG_BUILD_DIR)' \
            '    $(CP) ./src/* $(PKG_BUILD_DIR)/' \
            '    @echo "[v55l] STAGING_INC=$(STAGING_INC)"' \
            '    @echo "[v55l] TOOLCHAIN_DIR=$(TOOLCHAIN_DIR)"' \
            '    @echo "[v55l] TOOLCHAIN_INC=$(TOOLCHAIN_INC)"' \
            '    @echo "[v55l] TOOLCHAIN_USR_INC=$(TOOLCHAIN_USR_INC)"' \
            '    @echo "[v55l] AST_VERSIONED_HEADERS=$(AST_VERSIONED_HEADERS)"' \
            '    @echo "[v55l] AST_FLAT_HEADERS=$(AST_FLAT_HEADERS)"' \
            '    @echo "[v55l] AST_HEADERS=$(AST_HEADERS)"' \
            '    @echo "[v55l] AST_INC=$(AST_INC)"' \
            '    @echo "[v55l] TARGET_ICONV_HEADERS=$(TARGET_ICONV_HEADERS)"' \
            '    @echo "[v55l] TOOLCHAIN_ICONV_HEADERS=$(TOOLCHAIN_ICONV_HEADERS)"' \
            '    @echo "[v55l] TOOLCHAIN_USR_ICONV_HEADERS=$(TOOLCHAIN_USR_ICONV_HEADERS)"' \
            '    @echo "[v55l] ICONV_HEADERS=$(ICONV_HEADERS)"' \
            '    @echo "[v55l] ASTERISK_VER=$(ASTERISK_VER)"' \
            '    @test -n "$(AST_HEADERS)" || { echo "[v55l] ERROR: cannot determine Asterisk include root"; exit 1; }' \
            '    @test -f "$(AST_HEADERS)/asterisk.h" || { echo "[v55l] ERROR: asterisk.h not found in AST_HEADERS=$(AST_HEADERS)"; exit 1; }' \
            '    @test -f "$(AST_INC)/compat.h" || { echo "[v55l] ERROR: compat.h not found"; exit 1; }' \
            '    @test -f "$(AST_INC)/astmm.h" || { echo "[v55l] ERROR: astmm.h not found"; exit 1; }' \
            '    @test -n "$(ICONV_HEADERS)" || { echo "[v55l] ERROR: iconv include root is empty"; find "$(TOPDIR)/staging_dir/target-"* "$(TOPDIR)/staging_dir/toolchain-"* -type f -name "iconv.h" -print 2>/dev/null | sort || true; exit 1; }' \
            '    @test -f "$(ICONV_HEADERS)/iconv.h" || { echo "[v55l] ERROR: iconv.h not found under ICONV_HEADERS=$(ICONV_HEADERS)"; find "$(TOPDIR)/staging_dir/target-"* "$(TOPDIR)/staging_dir/toolchain-"* -type f -name "iconv.h" -print 2>/dev/null | sort || true; exit 1; }' \
            '    @[ -f "$(STAGING_INC)/sqlite3.h" ] && echo "[v55l] sqlite3.h staged" || echo "[v55l] sqlite3.h not staged yet; configure will verify" ' \
            '    @if [ -f "$(PKG_BUILD_DIR)/configure" ]; then chmod +x "$(PKG_BUILD_DIR)/configure"; echo "[v55l] configure present"; else echo "[v55l] ERROR: upstream configure missing"; ls -la "$(PKG_BUILD_DIR)"; exit 1; fi' \
            '    @printf "%s\n" "$(TARGET_CFLAGS_CLEAN) $(TARGET_CPPFLAGS_CLEAN)" | grep -Eq "(^|[[:space:]])(-I/usr/include|-I/usr/local/include|-isystem/usr/include|-isystem/usr/local/include|-isystem[[:space:]]+/usr/include|-isystem[[:space:]]+/usr/local/include)([[:space:]]|$)" && { echo "[v55l] ERROR: host include poison remains in flags"; echo "[v55l] CFLAGS=$(TARGET_CFLAGS_CLEAN)"; echo "[v55l] CPPFLAGS=$(TARGET_CPPFLAGS_CLEAN)"; exit 1; } || true' \
            '    @grep -q "<pthread.h>" "$(AST_INC)/compat.h" && echo "[v55l] compat.h already patched" || (sed -i "/^#include <unistd.h>/a#include <pthread.h>" "$(AST_INC)/compat.h" && echo "[v55l] compat.h patched")' \
            '    @grep -q "<pthread.h>" "$(AST_INC)/compat.h" || { echo "[v55l] ERROR: compat.h patch failed"; exit 1; }' \
            '    @{ grep -Eq "^#define[[:space:]]+ASTMM_LIBC[[:space:]]+ASTMM_IGNORE" "$(AST_INC)/astmm.h" && echo "[v55l] astmm.h already IGNORE"; } || (sed -i -E "s@^#define[[:space:]]+ASTMM_LIBC[[:space:]]+ASTMM_BLOCK.*@#define ASTMM_LIBC ASTMM_IGNORE /* OPENWRT_MUSL_ASTMM */@" "$(AST_INC)/astmm.h" && echo "[v55l] astmm.h patched")' \
            '    @grep -Eq "^#define[[:space:]]+ASTMM_LIBC[[:space:]]+ASTMM_IGNORE" "$(AST_INC)/astmm.h" || { echo "[v55l] ERROR: astmm.h not IGNORE after patch"; exit 1; }' \
            'endef' \
            '' \
            'define Build/Configure' \
            '    @echo "[v55l] Running configure..."' \
            '    cd $(PKG_BUILD_DIR) && $(TARGET_CONFIGURE_OPTS) DESTDIR="$(MODULES_DIR)" ac_cv_type_size_t=yes ac_cv_type_ssize_t=yes CPPFLAGS="$(TARGET_CPPFLAGS_CLEAN) -I$(STAGING_INC) -I$(STAGING_INC)/libusb-1.0 -I$(ICONV_HEADERS) -I$(AST_HEADERS) -DASTERISK_VERSION_NUM=$(ASTERISK_VERSION_NUM) -DAST_MODULE_SELF_SYM=__internal_asterisk_module_self -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0" CFLAGS="$(TARGET_CFLAGS_CLEAN) -fPIC -I$(STAGING_INC) -I$(STAGING_INC)/libusb-1.0 -I$(ICONV_HEADERS) -I$(AST_HEADERS) -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -Wno-error=format-security -Wno-error" LDFLAGS="$(TARGET_LDFLAGS)" ./configure --build=$(GNU_HOST_NAME) --host=$(GNU_TARGET_NAME) --prefix=/usr --with-asterisk=$(AST_HEADERS) --with-iconv=$(ICONV_HEADERS) --with-astversion=$(ASTERISK_VER) || { echo "[v55l] configure failed"; test -f config.log && { echo "=== config.log ==="; cat config.log; }; exit 1; }' \
            '    @test -f "$(PKG_BUILD_DIR)/Makefile" || { echo "[v55l] ERROR: Makefile not generated"; exit 1; }' \
            'endef' \
            '' \
            'define Build/Compile' \
            '    @echo "[v55l] Building..."' \
            '    $(MAKE) -C $(PKG_BUILD_DIR) CC="$(TARGET_CC)" AR="$(TARGET_AR)" LD="$(TARGET_CC)" STRIP="$(TARGET_STRIP)" DESTDIR="$(MODULES_DIR)" CFLAGS="$(TARGET_CFLAGS_CLEAN) -fPIC -I$(STAGING_INC) -I$(STAGING_INC)/libusb-1.0 -I$(ICONV_HEADERS) -I$(AST_HEADERS) -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -Wno-error=format-security -Wno-error" CPPFLAGS="$(TARGET_CPPFLAGS_CLEAN) -I$(STAGING_INC) -I$(STAGING_INC)/libusb-1.0 -I$(ICONV_HEADERS) -I$(AST_HEADERS) -DASTERISK_VERSION_NUM=$(ASTERISK_VERSION_NUM) -DAST_MODULE_SELF_SYM=__internal_asterisk_module_self -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0" LDFLAGS="$(TARGET_LDFLAGS)"' \
            '    @if [ -f "$(PKG_BUILD_DIR)/.libs/chan_quectel.so" ] && [ ! -f "$(PKG_BUILD_DIR)/chan_quectel.so" ]; then cp "$(PKG_BUILD_DIR)/.libs/chan_quectel.so" "$(PKG_BUILD_DIR)/chan_quectel.so"; fi' \
            '    @if [ -f "$(PKG_BUILD_DIR)/.libs/chan_quectels.so" ] && [ ! -f "$(PKG_BUILD_DIR)/chan_quectels.so" ]; then cp "$(PKG_BUILD_DIR)/.libs/chan_quectels.so" "$(PKG_BUILD_DIR)/chan_quectels.so"; fi' \
            '    @if [ -f "$(PKG_BUILD_DIR)/chan_quectels.so" ] && [ ! -f "$(PKG_BUILD_DIR)/chan_quectel.so" ]; then cp "$(PKG_BUILD_DIR)/chan_quectels.so" "$(PKG_BUILD_DIR)/chan_quectel.so"; fi' \
            '    @test -f "$(PKG_BUILD_DIR)/chan_quectel.so" || { echo "[v55l] ERROR: chan_quectel.so NOT built"; echo "[v55l] build dir contents:"; ls -la "$(PKG_BUILD_DIR)"; echo "[v55l] .libs contents:"; ls -la "$(PKG_BUILD_DIR)/.libs" 2>/dev/null || true; exit 1; }' \
            'endef' \
            '' \
            'define Package/chan_quectel/install' \
            '    $(INSTALL_DIR) $(1)/usr/lib/asterisk/modules' \
            '    $(INSTALL_BIN) $(PKG_BUILD_DIR)/chan_quectel.so $(1)/usr/lib/asterisk/modules/' \
            'endef' \
            '' \
            '$(eval $(call BuildPackage,chan_quectel))' > "$MF"

          perl -pi -e 's/^ {4}/\t/' "$MF"
          sed -i 's/\r$//' "$MF"

          echo "=== Makefile v55l ==="
          nl -ba "$MF" | sed -n '1,380p'

      - name: Enable chan_quectel + final build
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          echo 'CONFIG_PACKAGE_chan_quectel=y' >> .config
          make defconfig
          make package/feeds/custom/chan_quectel/clean V=s || true
          if ! make package/feeds/custom/chan_quectel/compile V=s -j1; then
            echo "=== chan_quectel config.log dump ==="
            find build_dir -path '*/chan_quectel/config.log' -print | while IFS= read -r f; do
              echo "--- $f ---"
              sed -n '1,260p' "$f"
            done || true
            echo "=== chan_quectel generated Makefile dump ==="
            find build_dir -path '*/chan_quectel/Makefile' -print | while IFS= read -r f; do
              echo "--- $f ---"
              sed -n '1,260p' "$f"
            done || true
            exit 1
          fi

      - name: Collect artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          mkdir -p /tmp/artifacts
          find . -name "chan_quectel*.ipk" -exec cp -v {} /tmp/artifacts/ \; || true
          find build_dir -name "chan_quectel.so" -exec cp -v {} /tmp/artifacts/ \; || true
          ls -la /tmp/artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chan_quectel-ipk
          path: /tmp/artifacts/*