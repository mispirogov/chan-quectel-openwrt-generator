name: build-chan_quectel-ipk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git wget curl rsync \
            libncurses-dev zlib1g-dev gettext python3 unzip xz-utils zstd perl

      - name: Download OpenWrt SDK 24.10.4 (mediatek filogic)
        run: |
          set -eux
          mkdir -p /tmp/sdk
          cd /tmp/sdk
          wget -O sdk.tar.zst https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          echo "SDK_DIR=/tmp/sdk/${SDK_DIR#./}" >> "$GITHUB_ENV"

      - name: Add telephony feed + update/install feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          if ! grep -qE '^\s*src-git\s+telephony\s+' feeds.conf.default; then
            echo "src-git telephony https://github.com/openwrt/telephony.git;openwrt-24.10" >> feeds.conf.default
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Link asterisk + compute ASTERISK_VERSION_NUM
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          AST_SRC="${PWD}/feeds/telephony/net/asterisk"
          ln -sfn "${AST_SRC}" package/asterisk
          AST_VER="$(sed -nE 's/^PKG_VERSION:=//p' package/asterisk/Makefile | head -n1 || true)"
          AST_VER="${AST_VER%%[^0-9.]*}"
          if [ -z "$AST_VER" ]; then AST_VER="20.8.1"; fi
          OLDIFS="$IFS"
          IFS='.'
          set -- $AST_VER
          IFS="$OLDIFS"
          MA="${1:-0}"
          MI="${2:-0}"
          PA="${3:-0}"
          ASTERISK_VERSION_NUM="$(printf '%d%02d%02d' "$MA" "$MI" "$PA" | sed -E 's/^0+//')"
          if [ -z "$ASTERISK_VERSION_NUM" ]; then ASTERISK_VERSION_NUM="0"; fi
          echo "ASTERISK_VER=$AST_VER" >> "$GITHUB_ENV"
          echo "ASTERISK_VERSION_NUM=$ASTERISK_VERSION_NUM" >> "$GITHUB_ENV"

      - name: Minimal .config (build asterisk first)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          printf '%s\n' \
            'CONFIG_TARGET_mediatek=y' \
            'CONFIG_TARGET_mediatek_filogic=y' \
            'CONFIG_TARGET_mediatek_filogic_DEVICE_generic=y' \
            'CONFIG_PACKAGE_asterisk=y' \
            'CONFIG_PACKAGE_libopenssl=y' \
            'CONFIG_PACKAGE_libiconv-full=y' \
            'CONFIG_PACKAGE_alsa-lib=y' \
            'CONFIG_PACKAGE_libusb-1.0=y' > .config
          make defconfig

      - name: Build Asterisk first (populate staging)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          make package/asterisk/compile -j"$(nproc)" V=s

      - name: Add chan_quectel source + preinclude.h (v39b)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          rm -rf package/feeds/custom/chan_quectel
          mkdir -p package/feeds/custom/chan_quectel/src
          git clone --depth 1 https://github.com/IchthysMaranatha/asterisk-chan-quectel.git /tmp/chan
          rsync -a --delete /tmp/chan/ package/feeds/custom/chan_quectel/src/

          PRE="package/feeds/custom/chan_quectel/src/preinclude.h"
          printf '%s\n' \
            '#ifndef QUECTEL_PREINCLUDE_H' \
            '#define QUECTEL_PREINCLUDE_H' \
            '' \
            '#define _GNU_SOURCE 1' \
            '#define _DEFAULT_SOURCE 1' \
            '#define _POSIX_C_SOURCE 200809L' \
            '#define _XOPEN_SOURCE 700' \
            '#define _POSIX_TIMERS 1' \
            '#define _FILE_OFFSET_BITS 64' \
            '' \
            '#undef _FORTIFY_SOURCE' \
            '#define _FORTIFY_SOURCE 0' \
            '' \
            '#include <features.h>' \
            '#include <stdint.h>' \
            '#include <stddef.h>' \
            '#include <stdarg.h>' \
            '#include <limits.h>' \
            '#include <sys/types.h>' \
            '#include <stdio.h>' \
            '#include <time.h>' \
            '#include <string.h>' \
            '#include <pthread.h>' \
            '' \
            '#endif' > "$PRE"

          echo "=== preinclude.h v39b ==="
          cat "$PRE"

      - name: Write chan_quectel Makefile (v39b — late eval vars + robust astmm patch)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          MF="package/feeds/custom/chan_quectel/Makefile"

          printf '%s\n' \
            'include $(TOPDIR)/rules.mk' \
            '' \
            'PKG_NAME:=chan_quectel' \
            'PKG_VERSION:=git' \
            'PKG_RELEASE:=v39b' \
            '' \
            'PKG_BUILD_DIR:=$(BUILD_DIR)/chan_quectel' \
            'PKG_BUILD_DEPENDS:=asterisk' \
            '' \
            'include $(INCLUDE_DIR)/package.mk' \
            '' \
            '# IMPORTANT: define after package.mk, and use := only when deps are already defined' \
            'AST_INC:=$(STAGING_DIR_TARGET)/usr/include/asterisk' \
            'TOOLCHAIN_INC:=$(STAGING_DIR_TOOLCHAIN)/include' \
            '' \
            'define Package/chan_quectel' \
            '	SECTION:=net' \
            '	CATEGORY:=Network' \
            '	SUBMENU:=Telephony' \
            '	TITLE:=Asterisk channel driver for Quectel LTE modems' \
            '	DEPENDS:=+asterisk +libopenssl +libiconv-full +alsa-lib +libusb-1.0' \
            'endef' \
            '' \
            'define Package/chan_quectel/description' \
            '	Asterisk channel driver (chan_quectel) for Quectel LTE modems.' \
            'endef' \
            '' \
            'define Build/Prepare' \
            '	$(INSTALL_DIR) $(PKG_BUILD_DIR)' \
            '	$(CP) ./src/* $(PKG_BUILD_DIR)/' \
            '	@echo "[v39b] === PATH DIAGNOSTICS ==="' \
            '	@echo "[v39b] STAGING_DIR_TARGET=$(STAGING_DIR_TARGET)"' \
            '	@echo "[v39b] STAGING_DIR_TOOLCHAIN=$(STAGING_DIR_TOOLCHAIN)"' \
            '	@echo "[v39b] AST_INC=$(AST_INC)"' \
            '	@echo "[v39b] TOOLCHAIN_INC=$(TOOLCHAIN_INC)"' \
            '	@test -f "$(AST_INC)/compat.h" || { echo "[v39b] ERROR: compat.h not found"; exit 1; }' \
            '	@test -f "$(AST_INC)/astmm.h"  || { echo "[v39b] ERROR: astmm.h not found"; exit 1; }' \
            '	@test -f "$(AST_INC)/compiler.h" || { echo "[v39b] ERROR: compiler.h not found"; exit 1; }' \
            '	@test -f "$(AST_INC)/autoconfig.h" || { echo "[v39b] ERROR: autoconfig.h not found"; exit 1; }' \
            '	@test -f "$(TOOLCHAIN_INC)/stdint.h" || { echo "[v39b] ERROR: toolchain stdint.h not found"; exit 1; }' \
            '	@if grep -q "<pthread.h>" "$(AST_INC)/compat.h"; then echo "[v39b] compat.h already patched"; else sed -i "/^#include <unistd.h>/a#include <pthread.h>" "$(AST_INC)/compat.h" && echo "[v39b] compat.h patched"; fi' \
            '	@if grep -q "OPENWRT_MUSL_ASTMM" "$(AST_INC)/astmm.h"; then echo "[v39b] astmm.h already patched"; else ' \
            '		sed -i -E "s|^#define[[:space:]]+ASTMM_LIBC[[:space:]]+ASTMM_BLOCK[[:space:]]*$|#define ASTMM_LIBC ASTMM_IGNORE /* OPENWRT_MUSL_ASTMM */|" "$(AST_INC)/astmm.h" && echo "[v39b] astmm.h patched to IGNORE"; ' \
            '	fi' \
            'endef' \
            '' \
            'define Build/Compile' \
            '	@echo "=== v39b BUILD ==="' \
            '	@echo "AST_INC=$(AST_INC)"' \
            '	@echo "TOOLCHAIN_INC=$(TOOLCHAIN_INC)"' \
            '	$(MAKE) -C $(PKG_BUILD_DIR) \' \
            '		CC="$(TARGET_CC)" AR="$(TARGET_AR)" LD="$(TARGET_CC)" STRIP="$(TARGET_STRIP)" \' \
            '		override CFLAGS="$(TARGET_CFLAGS) -U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0 -isystem $(TOOLCHAIN_INC) -include $(AST_INC)/compiler.h -include $(AST_INC)/autoconfig.h -include $(PKG_BUILD_DIR)/preinclude.h -I$(STAGING_DIR_TARGET)/usr/include -I$(AST_INC) -I$(STAGING_DIR_TARGET)/usr/include/libusb-1.0 -DASTERISK_VERSION_NUM='"${ASTERISK_VERSION_NUM}"' -DAST_MODULE_SELF_SYM=__internal_asterisk_module_self -fPIC -fstack-protector" \' \
            '		LDFLAGS="$(TARGET_LDFLAGS)"' \
            '	@test -f $(PKG_BUILD_DIR)/chan_quectel.so || { echo "ERROR: chan_quectel.so NOT built"; exit 1; }' \
            '	@echo "=== v39b SUCCESS: chan_quectel.so built ==="' \
            'endef' \
            '' \
            'define Package/chan_quectel/install' \
            '	$(INSTALL_DIR) $(1)/usr/lib/asterisk/modules' \
            '	$(INSTALL_BIN) $(PKG_BUILD_DIR)/chan_quectel.so $(1)/usr/lib/asterisk/modules/' \
            'endef' \
            '' \
            '$(eval $(call BuildPackage,chan_quectel))' \
            > "$MF"

          perl -pi -e 's/^ {4}/\t/' "$MF"
          sed -i 's/\r$//' "$MF"
          echo "=== Makefile v39b ready ==="
          nl -ba "$MF" | sed -n '1,220p'

      - name: Enable chan_quectel + final build
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          echo 'CONFIG_PACKAGE_chan_quectel=y' >> .config
          make defconfig
          make package/feeds/custom/chan_quectel/compile V=s -j"$(nproc)"

      - name: Collect artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          mkdir -p /tmp/artifacts
          find . -name "chan_quectel*.ipk" -exec cp -v {} /tmp/artifacts/ \; || true
          find build_dir -name "chan_quectel.so" -exec cp -v {} /tmp/artifacts/ \; || true
          ls -la /tmp/artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chan_quectel-ipk
          path: /tmp/artifacts/*