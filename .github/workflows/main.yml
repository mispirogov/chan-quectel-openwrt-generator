name: Build-IPK-OpenWrt-24.10.4-filogic-Asterisk20-chan-quectel

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 330  # GitHub-hosted job limit = 6h. https://docs.github.com/en/actions/reference/limits

    env:
      # SDK 24.10.4 mediatek/filogic + sha256 из официального каталога загрузок
      # https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/  (см. openwrt-sdk-...tar.zst)
      SDK_URL: "https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
      SDK_SHA256: "b9762b8e1c8e114b0e6a252b98e94e6e4a1d2496beb9f6044c26227a8d78dee0"
      SDK_DIRNAME: "openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64"

      CCACHE_DIR: "${{ github.workspace }}/.ccache"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare out/ + stub logs (so artifact is never empty)
        run: |
          set -eux
          mkdir -p out
          echo "CI started at: $(date -u +'%F %T UTC')" > out/meta.txt
          echo "If build fails early, see workflow logs." > out/README.txt

      - name: Host deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates wget git \
            build-essential gawk gettext file rsync unzip \
            python3 zstd ccache \
            libncurses5-dev libncursesw5-dev zlib1g-dev

      - name: Cache (dl + ccache)
        uses: actions/cache@v4
        with:
          # Cache создаётся при cache miss только если job завершился успешно:
          # https://github.com/actions/cache
          path: |
            wrtsdk/dl
            .ccache
          key: ubuntu-22.04-owrt-24.10.4-filogic-sdk-b9762b8e-chanq-v1
          restore-keys: |
            ubuntu-22.04-owrt-24.10.4-filogic-

      - name: Download SDK + verify sha256
        run: |
          set -eux
          wget -O sdk.tar.zst "${SDK_URL}"
          echo "${SDK_SHA256}  sdk.tar.zst" | sha256sum -c -

      - name: Extract SDK
        run: |
          set -eux
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          mv "${SDK_DIRNAME}" wrtsdk
          rm -f sdk.tar.zst

      - name: Sanity check SDK (DON'T check openssl path)
        run: |
          set -eux
          test -x wrtsdk/scripts/feeds
          test -f wrtsdk/feeds.conf.default || true
          echo "SDK extracted OK" >> out/meta.txt

      - name: Write hardcoded feeds.conf (pinned commits from feeds.buildinfo)
        run: |
          set -eux
          # src-link = ln -s (OpenWrt scripts/feeds), поэтому путь должен существовать буквально.
          # https://raw.githubusercontent.com/openwrt/openwrt/v24.10.4/scripts/feeds
          cat > wrtsdk/feeds.conf <<'EOF'
          # Pinned commits for 24.10.4 filogic:
          # https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/feeds.buildinfo
          src-link cusrepo ../openwrt/urlmakefile/current/Ast20
          src-git packages https://github.com/openwrt/packages.git^f1470815f41fe199bfdafe9a91ad115bc2e91203
          src-git luci https://github.com/openwrt/luci.git^75e41cba5160281b2d1dca922719efef29f7ffd8
          src-git routing https://github.com/openwrt/routing.git^3eb59e9471858c83891979793f1dd29cca156919
          src-git telephony https://github.com/openwrt/telephony.git^2a4541d46199ac96fac214d02c908402831c4dc6
          EOF

      - name: Update feeds (only needed)
        working-directory: wrtsdk
        run: |
          set -eux
          ./scripts/feeds update cusrepo packages telephony

      - name: Install feeds (must install cusrepo -> package/feeds/cusrepo/chanq)
        working-directory: wrtsdk
        run: |
          set -eux
          ./scripts/feeds install -p cusrepo -a
          ./scripts/feeds install -p packages -a
          ./scripts/feeds install -p telephony asterisk

          # КРИТИЧНО: иначе дальше будет "No rule to make target package/feeds/cusrepo/chanq/compile"
          test -f package/feeds/cusrepo/chanq/Makefile
          echo "cusrepo installed OK" >> ../out/meta.txt

      - name: Prepare .config
        working-directory: wrtsdk
        run: |
          set -eux
          make defconfig
          echo "CONFIG_CCACHE=y" >> .config
          cat ../openwrt/urlmakefile/current/Ast20/addpkg >> .config
          make defconfig
          cp -f .config ../out/.config

      - name: Build only chanq (directory target), capture build.log
        working-directory: wrtsdk
        shell: bash
        run: |
          set -euxo pipefail
          export CCACHE_DIR="${CCACHE_DIR}"
          export CCACHE_COMPRESS=1
          export CCACHE_MAXSIZE=1G

          # ТРЕБУЕМАЯ ЦЕЛЬ:
          make -j1 V=sc package/feeds/cusrepo/chanq/compile 2>&1 | tee ../out/build.log

      - name: Collect resulting ipk(s)
        if: always()
        run: |
          set -eux
          # В SDK пакеты складываются в wrtsdk/bin/packages/<arch>/<feed>/
          find wrtsdk/bin/packages -type f -name '*.ipk' -print -exec cp -f {} out/ \; || true
          ls -la out | sed -n '1,200p'

      - name: Upload artifacts (must include ipk + build.log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: out-openwrt-24.10.4-filogic-chan-quectel
          path: out
          if-no-files-found: error
