name: Build-chan-quectel-ipk-filogic-24.10.4

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 330

    env:
      SDK_URL: https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
      SDK_SHA256: b9762b8e1c8e114b0e6a252b98e94e6e4a1d2496beb9f6044c26227a8d78dee0
      SDK_DIR: openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget curl xz-utils zstd ccache

      - name: Cache dl and ccache
        uses: actions/cache@v4
        with:
          path: |
            wrtsdk/dl
            .ccache
          key: ${{ runner.os }}-owrt24.10.4-filogic-chanq-v4
          restore-keys: |
            ${{ runner.os }}-owrt24.10.4-filogic-

      - name: Download SDK
        run: |
          wget -O sdk.tar.zst "$SDK_URL"
          echo "$SDK_SHA256  sdk.tar.zst" | sha256sum -c -

      - name: Extract SDK
        run: |
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          mv "$SDK_DIR" wrtsdk

      - name: Write pinned feeds.conf
        run: |
          cat > wrtsdk/feeds.conf <<'EOF'
          src-link cusrepo ${GITHUB_WORKSPACE}/openwrt/urlmakefile/current/Ast20
          src-git packages https://github.com/openwrt/packages.git^f1470815f41fe199bfdafe9a91ad115bc2e91203
          src-git luci https://github.com/openwrt/luci.git^75e41cba5160281b2d1dca922719efef29f7ffd8
          src-git routing https://github.com/openwrt/routing.git^3eb59e9471858c83891979793f1dd29cca156919
          src-git telephony https://github.com/openwrt/telephony.git^2a4541d46199ac96fac214d02c908402831c4dc6
          EOF

      - name: Update feeds
        working-directory: wrtsdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Show cusrepo packages
        working-directory: wrtsdk
        run: |
          find package/feeds/cusrepo -maxdepth 2 -type f -name Makefile -print || true

      - name: Prepare config
        working-directory: wrtsdk
        run: |
          make defconfig
          echo 'CONFIG_CCACHE=y' >> .config
          cat "${GITHUB_WORKSPACE}/openwrt/urlmakefile/current/Ast20/addpkg" >> .config
          make defconfig
          grep -E 'CONFIG_PACKAGE_.*chan' .config || true

      - name: Build only target package
        working-directory: wrtsdk
        run: |
          export CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache"
          export CCACHE_COMPRESS=1
          export CCACHE_MAXSIZE=1G
          make package/feeds/cusrepo/asterisk20-chan-quectel/compile -j1 V=sc 2>&1 | tee "${GITHUB_WORKSPACE}/build.log"

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p out
          cp -f build.log out/ || true
          cp -f wrtsdk/.config out/ || true
          cp -f wrtsdk/feeds.conf out/ || true
          find wrtsdk/bin/packages -type f -name '*.ipk' -print -exec cp -f {} out/ \; || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chan-quectel-ipk-filogic
          path: out