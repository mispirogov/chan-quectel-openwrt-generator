name: Build-IPK-OpenWrt-24.10.4-filogic-Asterisk20-chan-quectel

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 330 # GitHub-hosted job max 6h: https://docs.github.com/en/actions/reference/limits
    env:
      SDK_URL: "https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
      SDK_SHA256: "b9762b8e1c8e114b0e6a252b98e94e6e4a1d2496beb9f6044c26227a8d78dee0"
      SDK_DIRNAME: "openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64"
      CCACHE_DIR: "${{ github.workspace }}/.ccache"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare out/ (never empty)
        run: |
          set -eux
          mkdir -p out
          echo "started: $(date -u +'%F %T UTC')" > out/meta.txt

      - name: Host deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates wget git \
            build-essential gawk gettext file rsync unzip \
            python3 zstd ccache \
            libncurses5-dev libncursesw5-dev zlib1g-dev

      - name: Cache (dl + ccache)
        uses: actions/cache@v4
        with:
          path: |
            wrtsdk/dl
            .ccache
          # пример ключа: включает SDK_SHA256 (b9762b8e...) и хеш файлов пакета
          key: owrt-${{ runner.os }}-24.10.4-filogic-sdksum-b9762b8e-${{ hashFiles('openwrt/urlmakefile/current/Ast20/chanq/Makefile','openwrt/urlmakefile/current/Ast20/addpkg') }}
          restore-keys: |
            owrt-${{ runner.os }}-24.10.4-filogic-
            owrt-${{ runner.os }}-
          # restore-keys — префиксный fallback: при отсутствии точного key берётся самый свежий кэш по префиксу.
          # https://docs.github.com/en/actions/reference/workflows-and-actions/dependency-caching

      - name: Download SDK + verify sha256
        run: |
          set -eux
          wget -O sdk.tar.zst "${SDK_URL}"
          echo "${SDK_SHA256}  sdk.tar.zst" | sha256sum -c -

      - name: Extract SDK -> wrtsdk
        run: |
          set -eux
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          mv "${SDK_DIRNAME}" wrtsdk
          rm -f sdk.tar.zst
          test -x wrtsdk/scripts/feeds

      - name: Write wrtsdk/feeds.conf (pinned commits + cusrepo via relative src-link)
        run: |
          set -eux
          cat > wrtsdk/feeds.conf <<'EOF'
          # pinned commits: https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/feeds.buildinfo
          # src-link is implemented as `ln -sf` in scripts/feeds (symlink), so path must exist literally.
          # https://raw.githubusercontent.com/openwrt/openwrt/v24.10.4/scripts/feeds
          src-link cusrepo ../openwrt/urlmakefile/current/Ast20
          src-git packages https://github.com/openwrt/packages.git^f1470815f41fe199bfdafe9a91ad115bc2e91203
          src-git luci https://github.com/openwrt/luci.git^75e41cba5160281b2d1dca922719efef29f7ffd8
          src-git routing https://github.com/openwrt/routing.git^3eb59e9471858c83891979793f1dd29cca156919
          src-git telephony https://github.com/openwrt/telephony.git^2a4541d46199ac96fac214d02c908402831c4dc6
          EOF

      - name: Update feeds (only needed)
        working-directory: wrtsdk
        run: |
          set -eux
          ./scripts/feeds update cusrepo packages telephony

      - name: Install package definitions (minimal, avoid installing entire packages feed)
        working-directory: wrtsdk
        run: |
          set -eux
          # 1) обязательно: cusrepo -> создаст package/feeds/cusrepo/chanq
          ./scripts/feeds install -p cusrepo -a
          test -f package/feeds/cusrepo/chanq/Makefile

          # 2) telephony: только asterisk (Asterisk 20.8.1 в pinned telephony)
          ./scripts/feeds install -p telephony asterisk

          # 3) packages: минимальный набор, чтобы asterisk конфиг/зависимости были видны (не -a!)
          ./scripts/feeds install -p packages jansson libedit libxml2 sqlite3 alsa-lib libusb-1.0 usb-modeswitch || true

      - name: Prepare wrtsdk/.config (append addpkg)
        working-directory: wrtsdk
        run: |
          set -eux
          make defconfig
          echo "CONFIG_CCACHE=y" >> .config
          cat ../openwrt/urlmakefile/current/Ast20/addpkg >> .config
          make defconfig
          cp -f .config ../out/.config
          cp -f feeds.conf ../out/feeds.conf

      - name: Build ONLY this target (directory = chanq), capture build.log
        working-directory: wrtsdk
        shell: bash
        run: |
          set -euxo pipefail
          export CCACHE_DIR="${CCACHE_DIR}"
          export CCACHE_COMPRESS=1
          export CCACHE_MAXSIZE=1G

          # IMPORTANT:
          # make target uses directory name under package/feeds/<feed>/ (here it's chanq),
          # not PKG_NAME. Поэтому цель: .../chanq/compile
          make -j1 V=sc package/feeds/cusrepo/chanq/compile 2>&1 | tee ../out/build.log

      - name: Collect ipk(s) + verify ipk exists
        if: always()
        shell: bash
        run: |
          set -eux
          # копируем только cusrepo ipk (как вы просили)
          find wrtsdk/bin/packages -type f -name '*.ipk' -path '*cusrepo*' -print -exec cp -f {} out/ \; || true

          # Требуем, чтобы реально был собран именно ваш ipk
          ls -la out | sed -n '1,200p'
          if ! ls out/asterisk20-chan-quectel_*_aarch64_cortex-a53.ipk >/dev/null 2>&1; then
            echo "ERROR: asterisk20-chan-quectel ipk not found in out/" >&2
            exit 1
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: out-openwrt-24.10.4-filogic-chan-quectel
          path: out
          if-no-files-found: error
